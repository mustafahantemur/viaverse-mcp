services:
  postgres:
    image: postgres:16.4
    container_name: viaverse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-viaverse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viaverse-local}
      POSTGRES_DB: ${POSTGRES_DB:-viaverse}
    ports:
      - "${VIAVERSE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viaverse} -d ${POSTGRES_DB:-viaverse}"]
      interval: 5s
      timeout: 5s
      retries: 24

  valkey:
    image: valkey/valkey:8.0.1
    container_name: viaverse-valkey
    restart: unless-stopped
    ports:
      - "${VIAVERSE_REDIS_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:4.1.1
    container_name: viaverse-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${VIAVERSE_KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "${VIAVERSE_KAFKA_PORT:-9092}:9092"

  mailpit:
    image: axllent/mailpit:v1.20.3
    container_name: viaverse-mailpit
    restart: unless-stopped
    ports:
      - "${VIAVERSE_MAILPIT_SMTP_PORT:-1025}:1025"
      - "${VIAVERSE_MAILPIT_WEB_PORT:-8025}:8025"

  seaweedfs:
    image: chrislusf/seaweedfs:3.93
    container_name: viaverse-seaweedfs
    restart: unless-stopped
    command:
      - server
      - -dir=/data
      - -ip=seaweedfs
      - -ip.bind=0.0.0.0
      - -master.port=9333
      - -volume.port=8080
      - -filer=true
      - -filer.port=8888
      - -s3
      - -s3.port=8333
      - -s3.config=/etc/seaweedfs/s3-config.json
    ports:
      - "${SEAWEEDFS_MASTER_PORT:-9333}:9333"
      - "${SEAWEEDFS_VOLUME_PORT:-8080}:8080"
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
      - "${SEAWEEDFS_S3_PORT:-8333}:8333"
    volumes:
      - seaweedfs-data:/data
      - ./seaweedfs/s3-config.json:/etc/seaweedfs/s3-config.json:ro

volumes:
  postgres-data:
  valkey-data:
  seaweedfs-data:
