<text x="1528" y="1152" class="small">QuoteAccepted / JobCreated</text>
<rect x="80" y="1280" width="1700" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="1304" class="t">Sequence focus:</text>
<text x="96" y="1322" class="t">Quote is sent by worker/business and accepted only by request owner. Acceptance creates the handoff toward payment/job lifecycle.</text>
