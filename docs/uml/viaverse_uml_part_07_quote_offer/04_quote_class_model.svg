<text x="250.0" y="646.0" text-anchor="middle" class="t">id: JobId</text>
<text x="250.0" y="666.0" text-anchor="middle" class="t">requestId: RequestId</text>
<text x="250.0" y="686.0" text-anchor="middle" class="t">acceptedQuoteId: QuoteId</text>
