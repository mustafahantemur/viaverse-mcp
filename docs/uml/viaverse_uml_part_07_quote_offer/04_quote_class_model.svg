<text x="270.0" y="443.0" text-anchor="middle" class="t">createdAt: Instant</text>
<rect x="560" y="150" width="340" height="220" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="730.0" y="188.0" text-anchor="middle" class="h">QuoteRevision</text>
<text x="730.0" y="208.0" text-anchor="middle" class="t">--</text>
<text x="730.0" y="228.0" text-anchor="middle" class="t">id: UUID</text>
<text x="730.0" y="248.0" text-anchor="middle" class="t">quoteId: QuoteId</text>
<text x="730.0" y="268.0" text-anchor="middle" class="t">price: Money?</text>
<text x="730.0" y="288.0" text-anchor="middle" class="t">message: String?</text>
<text x="730.0" y="308.0" text-anchor="middle" class="t">reason: String?</text>
<text x="730.0" y="328.0" text-anchor="middle" class="t">createdBy: AccountId</text>
<text x="730.0" y="348.0" text-anchor="middle" class="t">createdAt: Instant</text>
<rect x="1020" y="150" width="340" height="220" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
