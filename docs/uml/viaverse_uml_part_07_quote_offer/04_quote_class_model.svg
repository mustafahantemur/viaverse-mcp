<text x="730.0" y="622.0" text-anchor="middle" class="t">--</text>
<text x="730.0" y="642.0" text-anchor="middle" class="t">QuoteSent</text>
<text x="730.0" y="662.0" text-anchor="middle" class="t">QuoteRevised</text>
<text x="730.0" y="682.0" text-anchor="middle" class="t">QuoteWithdrawn</text>
<text x="730.0" y="702.0" text-anchor="middle" class="t">QuoteRejected</text>
<text x="730.0" y="722.0" text-anchor="middle" class="t">QuoteAccepted</text>
<text x="730.0" y="742.0" text-anchor="middle" class="t">JobCreated</text>
<rect x="1020" y="570" width="340" height="210" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1190.0" y="603.0" text-anchor="middle" class="h">OutboxEvent</text>
<text x="1190.0" y="623.0" text-anchor="middle" class="t">--</text>
<text x="1190.0" y="643.0" text-anchor="middle" class="t">id: UUID</text>
<text x="1190.0" y="663.0" text-anchor="middle" class="t">aggregateType</text>
<text x="1190.0" y="683.0" text-anchor="middle" class="t">aggregateId</text>
<text x="1190.0" y="703.0" text-anchor="middle" class="t">eventType</text>
<text x="1190.0" y="723.0" text-anchor="middle" class="t">payload</text>
<text x="1190.0" y="743.0" text-anchor="middle" class="t">correlationId</text>
<text x="1190.0" y="763.0" text-anchor="middle" class="t">causationId</text>
<rect x="1460" y="570" width="360" height="210" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1640.0" y="630.0" text-anchor="middle" class="h">QuoteVisibilityRule</text>
<text x="1640.0" y="650.0" text-anchor="middle" class="t">--</text>
<text x="1640.0" y="670.0" text-anchor="middle" class="t">requester can view all own quotes</text>
<text x="1640.0" y="690.0" text-anchor="middle" class="t">sender can view own quote</text>
<text x="1640.0" y="710.0" text-anchor="middle" class="t">competitors cannot view each other</text>
<text x="1640.0" y="730.0" text-anchor="middle" class="t">admin requires audit</text>
<polyline points="460,260 560,250" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="568" y="242" class="small">1 -&gt; many</text>
<polyline points="1020,240 460,240" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="468" y="232" class="small">validates</text>
<polyline points="1360,240 1460,245" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1468" y="237" class="small">checks owner/state</text>
<polyline points="460,200 1460,200" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1468" y="192" class="small">belongs to</text>
<polyline points="270,450 270,570" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="278" y="562" class="small">accepted creates</text>
<polyline points="460,380 730,380 730,570" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="738" y="372" class="small">emits</text>
<polyline points="900,665 1020,675" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1028" y="667" class="small">serialized as</text>
<polyline points="1460,675 1370,675 1370,500 270,500 270,450" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1378" y="492" class="small">protects</text>
<rect x="80" y="1060" width="1540" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="1084" class="t">Domain rule:</text>
<text x="96" y="1102" class="t">Quote acceptance must be atomic: one accepted quote per request, competing quotes transition out of selectable state, and Job draft is created.</text>
</svg>
