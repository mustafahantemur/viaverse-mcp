<text x="1190.0" y="297.0" text-anchor="middle" class="t">canAcceptQuote()</text>
<text x="1190.0" y="317.0" text-anchor="middle" class="t">validateQuoteNotExpired()</text>
<text x="1190.0" y="337.0" text-anchor="middle" class="t">validateRequestOwner()</text>
<rect x="1460" y="150" width="330" height="190" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1625.0" y="191.0" text-anchor="middle" class="h">ServiceRequest</text>
<text x="1625.0" y="211.0" text-anchor="middle" class="t">--</text>
<text x="1625.0" y="231.0" text-anchor="middle" class="t">id: RequestId</text>
<text x="1625.0" y="251.0" text-anchor="middle" class="t">requesterAccountId: AccountId</text>
<text x="1625.0" y="271.0" text-anchor="middle" class="t">status: RequestStatus</text>
<text x="1625.0" y="291.0" text-anchor="middle" class="t">budget: Budget</text>
<text x="1625.0" y="311.0" text-anchor="middle" class="t">categoryId: CategoryId</text>
<rect x="80" y="570" width="340" height="180" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
