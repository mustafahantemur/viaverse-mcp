<rect x="350" y="1180" width="1320" height="58" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="366" y="1204" class="t">Rules:</text>
<text x="366" y="1222" class="t">Sending quotes/offers is free. Requester sees quotes for own request only. Competitor quote details are not visible to other workers/businesses.</text>
