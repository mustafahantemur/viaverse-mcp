<rect x="160" y="1080" width="1550" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="176" y="1104" class="t">State rule:</text>
<text x="176" y="1122" class="t">PUBLISHED means visible/lead-routable. VERIFIED alone is not enough; catalog, branch/service area and billing/subscription gates must also pass.</text>
