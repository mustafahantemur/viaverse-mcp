<text x="1405.0" y="636.0" text-anchor="middle" class="t">with timeout/budget</text>
<rect x="1640" y="580" width="350" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1815.0" y="616.0" text-anchor="middle" class="h">Output moderation</text>
<text x="1815.0" y="636.0" text-anchor="middle" class="t">policy + hallucination checks</text>
