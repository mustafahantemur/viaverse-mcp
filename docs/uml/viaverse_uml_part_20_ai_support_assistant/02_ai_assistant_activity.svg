<polyline points="1240,845 720,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="728" y="832" class="small">yes</text>
<polyline points="800,840 720,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="570,880 570,1020" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="750,1060 800,1068" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="330" y="1190" width="1580" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="346" y="1214" class="t">Safety rule:</text>
<text x="346" y="1232" class="t">Use minimal context and redaction before model call. Do not put full private chat, payment data, raw identity documents or secrets into prompts.</text>
