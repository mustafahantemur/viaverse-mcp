<svg xmlns="http://www.w3.org/2000/svg" width="2300" height="1600" viewBox="0 0 2300 1600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2220" height="60" rx="14" fill="#022C22"/>
<text x="1150.0" y="69" text-anchor="middle" class="title">Viaverse AI Session / Support Ticket — State Diagram</text>

<rect x="120" y="180" width="320" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="280.0" y="220.0" text-anchor="middle" class="h">AI_SESSION_STARTED</text>
<rect x="560" y="180" width="280" height="80" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="700.0" y="220.0" text-anchor="middle" class="h">CONTEXT_READY</text>
<rect x="960" y="180" width="250" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1085.0" y="220.0" text-anchor="middle" class="h">GENERATING</text>
<rect x="1320" y="180" width="240" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="1440.0" y="220.0" text-anchor="middle" class="h">ANSWERED</text>
<rect x="1320" y="500" width="240" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
