<rect x="120" y="500" width="300" height="80" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="270.0" y="540.0" text-anchor="middle" class="h">AGENT_ASSIGNED</text>
<rect x="560" y="820" width="220" height="80" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="670.0" y="860.0" text-anchor="middle" class="h">RESOLVED</text>
<rect x="960" y="820" width="330" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="1125.0" y="860.0" text-anchor="middle" class="h">FEEDBACK_RECEIVED</text>
<polyline points="440,220 560,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="568" y="212" class="small">build context</text>
<polyline points="840,220 960,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="968" y="212" class="small">safe</text>
<polyline points="1210,220 1320,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1328" y="212" class="small">safe/confident</text>
<polyline points="1085,260 1085,360 1440,360 1440,500" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1448" y="352" class="small">unsafe/low confidence</text>
<polyline points="1320,540 1320,540" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1328" y="532" class="small">handoff</text>
<polyline points="1085,260 1085,500" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1093" y="492" class="small">risky intent</text>
<polyline points="960,540 860,540" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="868" y="532" class="small">create</text>
<polyline points="560,540 420,540" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="428" y="532" class="small">assign</text>
<polyline points="270,580 270,760 670,760 670,820" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="678" y="752" class="small">agent resolves</text>
<polyline points="1440,260 1440,760 1125,760 1125,820" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1133" y="752" class="small">user feedback</text>
<polyline points="780,860 960,860" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="968" y="852" class="small">support feedback</text>
<rect x="160" y="1080" width="1500" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="176" y="1104" class="t">State rule:</text>
<text x="176" y="1122" class="t">AI answered does not mean action completed. It means guidance was delivered. Risky/business actions require separate confirmed domain workflow.</text>
</svg>
