<polyline points="1760,1040 1830,1040" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1838" y="1032" class="small">notify participants</text>
<rect x="80" y="1320" width="1720" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="1344" class="t">Sequence focus:</text>
<text x="96" y="1362" class="t">Provider callback is the source for final payment state, but only after signature/reference/amount/currency verification and idempotency check.</text>
