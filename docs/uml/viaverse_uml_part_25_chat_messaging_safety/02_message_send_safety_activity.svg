<polyline points="750,185 860,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1190,185 1300,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1600,185 1700,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1850,230 1850,360" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1700,400 1630,400" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1638" y="392" class="small">yes</text>
<polyline points="1300,400 1160,400" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1700,400 770,405" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="778" y="397" class="small">no</text>
<polyline points="860,400 770,405" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="778" y="397" class="small">allowed/held</text>
<polyline points="600,450 600,600" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="730,637 860,637" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1140,637 1300,637" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1450,675 1450,820" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1300,860 1010,868" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="330" y="1060" width="1550" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="346" y="1084" class="t">Safety rule:</text>
<text x="346" y="1102" class="t">Unsafe message may be blocked, warned, held for review, or allowed with event/audit depending on policy severity. Never silently drop without user-visible state.</text>
</svg>
