<rect x="80" y="1320" width="1780" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="1344" class="t">Realtime transport is adapter-level. Core chat-service should work with WebSocket, SSE or polling. Message persistence and safety policy stay independent from transport.</text>
