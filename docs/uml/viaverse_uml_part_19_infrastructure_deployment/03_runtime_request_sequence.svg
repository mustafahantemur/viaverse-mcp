<text x="1148" y="422" class="small">authorized command/query</text>
<polyline points="1330,520 1410,520" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1418" y="512" class="small">transaction + outbox insert</text>
<polyline points="1330,620 1680,620" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1688" y="612" class="small">publish via outbox relay</text>
<polyline points="1330,720 1950,720" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1958" y="712" class="small">trace/log/metric</text>
<polyline points="1140,850 1060,850" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1068" y="842" class="small">response DTO</text>
<polyline points="870,930 760,930 760,1220 174,1220 174,930" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="768" y="1212" class="small">redacted response</text>
<polyline points="1680,1010 1140,1010" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1148" y="1002" class="small">async consumer in other service</text>
<rect x="80" y="1340" width="1780" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="1364" class="t">Runtime rule:</text>
<text x="96" y="1382" class="t">Synchronous calls go through gateway/BFF for external clients. Domain-to-domain consistency uses events/outbox where possible; avoid distributed transactions.</text>
