<polyline points="520,310 600,310" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="608" y="302" class="small">WAF passed</text>
<polyline points="790,360 870,360" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="878" y="352" class="small">route to BFF</text>
