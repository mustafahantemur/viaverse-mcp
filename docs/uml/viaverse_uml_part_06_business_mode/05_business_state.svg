<svg xmlns="http://www.w3.org/2000/svg" width="2150" height="1500" viewBox="0 0 2150 1500">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2070" height="60" rx="14" fill="#022C22"/>
<text x="1075.0" y="69" text-anchor="middle" class="title">Viaverse Business Profile / Subscription — State Diagram</text>

<rect x="120" y="180" width="260" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="250.0" y="220.0" text-anchor="middle" class="h">BUSINESS_DRAFT</text>
<rect x="520" y="180" width="300" height="80" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="670.0" y="220.0" text-anchor="middle" class="h">PENDING_VERIFICATION</text>
<rect x="980" y="180" width="260" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1110.0" y="220.0" text-anchor="middle" class="h">PUBLIC_ACTIVE</text>
<rect x="1380" y="180" width="250" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1505.0" y="220.0" text-anchor="middle" class="h">UNPUBLISHED</text>
<rect x="980" y="470" width="260" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1110.0" y="510.0" text-anchor="middle" class="h">SUSPENDED</text>
<rect x="520" y="470" width="250" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="645.0" y="510.0" text-anchor="middle" class="h">DELETED</text>
<rect x="120" y="760" width="330" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="285.0" y="800.0" text-anchor="middle" class="h">SUBSCRIPTION_TRIALING</text>
<rect x="590" y="760" width="320" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="750.0" y="800.0" text-anchor="middle" class="h">SUBSCRIPTION_ACTIVE</text>
<rect x="1050" y="760" width="360" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1230.0" y="800.0" text-anchor="middle" class="h">SUBSCRIPTION_PAST_DUE</text>
<rect x="1550" y="760" width="350" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="1725.0" y="800.0" text-anchor="middle" class="h">SUBSCRIPTION_CANCELLED</text>
<polyline points="380,220 520,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="528" y="212" class="small">submit docs</text>
<polyline points="250,260 250,340 1110,340 1110,260" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1118" y="332" class="small">no review required</text>
<polyline points="820,220 980,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="988" y="212" class="small">approved</text>
<polyline points="1240,220 1380,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1388" y="212" class="small">owner unpublishes</text>
<polyline points="1380,260 1320,260 1320,220 1240,220" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1328" y="212" class="small">publish again</text>
<polyline points="1110,260 1110,470" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1118" y="462" class="small">policy/admin</text>
<polyline points="980,510 900,510 900,260 980,260" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="908" y="252" class="small">appeal/fix</text>
<polyline points="250,260 250,510 520,510" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="258" y="502" class="small">delete</text>
<polyline points="980,220 645,220 645,470" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="653" y="212" class="small">account/business deletion</text>
<polyline points="450,800 590,800" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="598" y="792" class="small">payment method / trial converts</text>
<polyline points="910,800 1050,800" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1058" y="792" class="small">payment failed</text>
<polyline points="1050,840 980,840 980,800 910,800" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="988" y="792" class="small">paid</text>
<polyline points="1410,800 1550,800" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1558" y="792" class="small">grace period ended</text>
<polyline points="750,760 750,700 1725,700 1725,760" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1733" y="692" class="small">owner cancels</text>
<rect x="140" y="1020" width="1450" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="156" y="1044" class="t">Important:</text>
<text x="156" y="1062" class="t">Profile state and subscription state are related but separate. Subscription status may reduce premium visibility/tools, but must not become pay-to-quote.</text>
</svg>
