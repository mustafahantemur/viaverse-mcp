<rect x="680" y="720" width="300" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="830.0" y="756.0" text-anchor="middle" class="h">Emit WorkerProfileActivated</text>
<text x="830.0" y="776.0" text-anchor="middle" class="t">and index profile</text>
