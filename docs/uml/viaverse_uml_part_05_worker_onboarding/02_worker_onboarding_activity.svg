<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1450" viewBox="0 0 2100 1450">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2020" height="60" rx="14" fill="#022C22"/>
<text x="1050.0" y="69" text-anchor="middle" class="title">Viaverse Worker Onboarding — Activity Diagram</text>

<rect x="80" y="160" width="130" height="50" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="145.0" y="185.0" text-anchor="middle" class="h">START</text>
<rect x="300" y="150" width="260" height="70" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="430.0" y="185.0" text-anchor="middle" class="h">Tap Enable Work Mode</text>
<rect x="680" y="140" width="310" height="90" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="835.0" y="176.0" text-anchor="middle" class="h">Check account eligibility</text>
<text x="835.0" y="196.0" text-anchor="middle" class="t">status + bans + required consent</text>
<rect x="1110" y="140" width="210" height="90" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
