<text x="430.0" y="386.0" text-anchor="middle" class="t">radius / districts</text>
<rect x="300" y="540" width="280" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="440.0" y="576.0" text-anchor="middle" class="h">Set availability</text>
<text x="440.0" y="596.0" text-anchor="middle" class="t">working days / hours</text>
<rect x="680" y="550" width="270" height="80" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="815.0" y="590.0" text-anchor="middle" class="h">Add portfolio media?</text>
<rect x="1060" y="540" width="310" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1215.0" y="576.0" text-anchor="middle" class="h">Upload portfolio media</text>
<text x="1215.0" y="596.0" text-anchor="middle" class="t">via media-service</text>
<rect x="1480" y="540" width="270" height="90" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="1615.0" y="585.0" text-anchor="middle" class="h">Verification required?</text>
<rect x="1480" y="720" width="300" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1630.0" y="756.0" text-anchor="middle" class="h">Submit verification</text>
<text x="1630.0" y="776.0" text-anchor="middle" class="t">identity/docs if needed</text>
<rect x="1060" y="720" width="290" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
