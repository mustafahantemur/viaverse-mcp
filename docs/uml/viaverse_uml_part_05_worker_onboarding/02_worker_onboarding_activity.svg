<polyline points="560,185 680,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="990,185 1110,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
