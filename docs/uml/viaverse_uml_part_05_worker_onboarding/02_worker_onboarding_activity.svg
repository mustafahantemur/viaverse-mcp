<text x="1498" y="177" class="small">no</text>
<polyline points="1215,230 1215,330" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1223" y="322" class="small">yes</text>
<polyline points="1110,375 980,375" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="680,375 560,375" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="430,420 430,540" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="580,585 680,590" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="950,590 1060,585" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1068" y="577" class="small">yes</text>
<polyline points="815,630 815,670 1615,670 1615,540" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1623" y="662" class="small">no</text>
<polyline points="1370,585 1480,585" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1615,630 1615,720" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1623" y="712" class="small">yes</text>
<polyline points="1480,585 1410,585 1410,760 1350,760" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1418" y="752" class="small">no</text>
<polyline points="1480,765 1350,765" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1358" y="757" class="small">approved</text>
<polyline points="1060,765 980,765" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="680,765 580,765" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="300" y="980" width="1250" height="62" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="316" y="1004" class="t">UX rule:</text>
<text x="316" y="1022" class="t">Onboarding should feel lightweight. Verification may be category/risk dependent, not mandatory for every low-risk category at launch.</text>
