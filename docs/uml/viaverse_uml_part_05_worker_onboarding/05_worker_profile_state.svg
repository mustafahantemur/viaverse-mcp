<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1450" viewBox="0 0 2100 1450">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2020" height="60" rx="14" fill="#022C22"/>
<text x="1050.0" y="69" text-anchor="middle" class="title">Viaverse Worker Profile — State Diagram</text>

<rect x="110" y="200" width="230" height="80" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="225.0" y="240.0" text-anchor="middle" class="h">NOT_CREATED</text>
<rect x="480" y="200" width="220" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="590.0" y="240.0" text-anchor="middle" class="h">DRAFT</text>
<rect x="840" y="200" width="290" height="80" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="985.0" y="240.0" text-anchor="middle" class="h">PENDING_VERIFICATION</text>
<rect x="1280" y="200" width="230" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1395.0" y="240.0" text-anchor="middle" class="h">ACTIVE</text>
<rect x="1280" y="500" width="230" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1395.0" y="540.0" text-anchor="middle" class="h">PAUSED</text>
<rect x="840" y="500" width="270" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="975.0" y="540.0" text-anchor="middle" class="h">SUSPENDED</text>
<rect x="480" y="500" width="300" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="630.0" y="540.0" text-anchor="middle" class="h">VERIFICATION_REJECTED</text>
<rect x="110" y="500" width="230" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="225.0" y="540.0" text-anchor="middle" class="h">DELETED</text>
<polyline points="340,240 480,240" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="488" y="232" class="small">start onboarding</text>
<polyline points="700,240 840,240" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="848" y="232" class="small">submit verification</text>
<polyline points="590,280 590,380 1395,380 1395,280" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1403" y="372" class="small">verification not required</text>
<polyline points="1130,240 1280,240" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1288" y="232" class="small">approved</text>
<polyline points="985,280 985,420 630,420 630,500" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="638" y="412" class="small">rejected</text>
<polyline points="630,500 630,280" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="638" y="272" class="small">fix and resubmit</text>
<polyline points="1395,280 1395,500" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1403" y="492" class="small">worker pauses</text>
<polyline points="1280,540 1210,540 1210,280 1280,280" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1218" y="272" class="small">resume</text>
<polyline points="1280,240 1110,240 1110,540" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1118" y="232" class="small">risk/admin</text>
<polyline points="840,540 760,540 760,320 1280,320" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="768" y="312" class="small">appeal/fix</text>
<polyline points="480,240 225,240 225,500" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="233" y="232" class="small">delete</text>
<polyline points="1280,240 225,240 225,500" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="233" y="232" class="small">account deletion</text>
<rect x="220" y="760" width="1250" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="236" y="784" class="t">State distinction:</text>
<text x="236" y="802" class="t">PAUSED is worker-controlled and reversible. SUSPENDED is policy/admin-controlled and blocks opportunities until resolved.</text>
</svg>
