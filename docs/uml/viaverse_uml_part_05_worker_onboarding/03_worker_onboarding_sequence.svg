<text x="1338" y="652" class="small">persist categories/area/availability</text>
<polyline points="250,760 330,760" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="338" y="752" class="small">POST /media/upload-sessions
optional portfolio</text>
<polyline points="500,800 1080,800" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1088" y="792" class="small">createUploadSession</text>
<polyline points="1250,840 1330,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1338" y="832" class="small">store MediaAsset</text>
<polyline points="250,960 330,960" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="338" y="952" class="small">POST /work/profile/publish</text>
