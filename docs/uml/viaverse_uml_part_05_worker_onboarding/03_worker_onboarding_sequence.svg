<text x="1338" y="1032" class="small">set ACTIVE + outbox</text>
<polyline points="1000,1080 1580,1080" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1588" y="1072" class="small">WorkerProfileActivated</text>
<polyline points="1750,1080 1830,1080" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1838" y="1072" class="small">index public worker profile</text>
<rect x="80" y="1200" width="1650" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="1224" class="t">Sequence focus:</text>
<text x="96" y="1242" class="t">Worker profile activation publishes search/matching projections. Profile source-of-truth remains marketplace-service/PostgreSQL.</text>
