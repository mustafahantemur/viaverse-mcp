<text x="680.0" y="561.0" text-anchor="middle" class="h">Trust Data</text>
<text x="680.0" y="581.0" text-anchor="middle" class="t">rating / badges / risk / disputes / reports</text>
<rect x="500" y="700" width="360" height="120" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="680.0" y="751.0" text-anchor="middle" class="h">Valkey Hot State</text>
<text x="680.0" y="771.0" text-anchor="middle" class="t">availability / rate limit / frequency cap</text>
<rect x="1050" y="360" width="360" height="160" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="1230.0" y="431.0" text-anchor="middle" class="h">Matching Ranker</text>
<text x="1230.0" y="451.0" text-anchor="middle" class="t">candidate scoring + explanation</text>
<rect x="1600" y="280" width="360" height="140" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1780.0" y="341.0" text-anchor="middle" class="h">WorkerOpportunity Projection</text>
<text x="1780.0" y="361.0" text-anchor="middle" class="t">requestId / targetId / score / reason codes</text>
<rect x="1600" y="540" width="360" height="120" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1780.0" y="591.0" text-anchor="middle" class="h">Notification Inbox / Push</text>
<text x="1780.0" y="611.0" text-anchor="middle" class="t">new matching opportunity</text>
<polyline points="380,240 980,240 980,420 1050,420" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="988" y="412" class="small">request features</text>
<polyline points="860,185 980,185 980,420 1050,420" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="988" y="412" class="small">candidate docs</text>
<polyline points="860,380 1050,420" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1058" y="412" class="small">eligibility</text>
<polyline points="860,570 980,570 980,460 1050,460" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="988" y="452" class="small">trust/risk</text>
<polyline points="860,760 980,760 980,500 1050,500" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="988" y="492" class="small">availability</text>
<polyline points="1410,430 1600,350" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1608" y="342" class="small">ranked opportunities</text>
<polyline points="1780,420 1780,540" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1788" y="532" class="small">notify</text>
<rect x="120" y="980" width="1500" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="136" y="1004" class="t">Data principle:</text>
<text x="136" y="1022" class="t">OpenSearch, trust summaries and hot availability are read inputs. The request source-of-truth remains marketplace-service/PostgreSQL.</text>
</svg>
