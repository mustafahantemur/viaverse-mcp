<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1450" viewBox="0 0 2100 1450">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2020" height="60" rx="14" fill="#022C22"/>
<text x="1050.0" y="69" text-anchor="middle" class="title">Viaverse Matching — Data Flow Diagram</text>

<rect x="80" y="180" width="300" height="120" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="230.0" y="231.0" text-anchor="middle" class="h">ServiceRequest Snapshot</text>
<text x="230.0" y="251.0" text-anchor="middle" class="t">category / budget / area / urgency</text>
<rect x="500" y="120" width="360" height="130" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="680.0" y="176.0" text-anchor="middle" class="h">OpenSearch Provider/Business Index</text>
<text x="680.0" y="196.0" text-anchor="middle" class="t">category / geo / services / public profile</text>
<rect x="500" y="320" width="360" height="120" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="680.0" y="371.0" text-anchor="middle" class="h">Identity Eligibility</text>
<text x="680.0" y="391.0" text-anchor="middle" class="t">account status / capabilities / business team</text>
