<rect x="80" y="1320" width="1700" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="1344" class="t">Sequence focus:</text>
<text x="96" y="1362" class="t">Dispute service owns the case and resolution audit. Payment service owns actual refund/payout movement and idempotency.</text>
