<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1550" viewBox="0 0 2200 1550">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2120" height="60" rx="14" fill="#022C22"/>
<text x="1100.0" y="69" text-anchor="middle" class="title">Viaverse Dispute / Refund / Payout — Activity Diagram</text>

<rect x="80" y="160" width="240" height="60" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="200.0" y="181.0" text-anchor="middle" class="h">START</text>
<text x="200.0" y="201.0" text-anchor="middle" class="t">problem before payout</text>
<rect x="430" y="150" width="240" height="70" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="550.0" y="185.0" text-anchor="middle" class="h">Open dispute</text>
<rect x="800" y="140" width="330" height="90" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="965.0" y="176.0" text-anchor="middle" class="h">Validate job/payment state</text>
<text x="965.0" y="196.0" text-anchor="middle" class="t">and participant</text>
<rect x="1240" y="140" width="230" height="90" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="1355.0" y="185.0" text-anchor="middle" class="h">Valid dispute?</text>
<rect x="1580" y="150" width="290" height="75" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1725.0" y="187.5" text-anchor="middle" class="h">Reject / route to support</text>
<rect x="1240" y="330" width="280" height="80" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1380.0" y="361.0" text-anchor="middle" class="h">Block payout</text>
<text x="1380.0" y="381.0" text-anchor="middle" class="t">create hold</text>
<rect x="800" y="330" width="330" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="965.0" y="366.0" text-anchor="middle" class="h">Collect evidence</text>
<text x="965.0" y="386.0" text-anchor="middle" class="t">messages / media / notes</text>
<rect x="430" y="340" width="270" height="70" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="565.0" y="375.0" text-anchor="middle" class="h">Notify other party</text>
<rect x="430" y="550" width="270" height="80" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="565.0" y="581.0" text-anchor="middle" class="h">Wait for response</text>
<text x="565.0" y="601.0" text-anchor="middle" class="t">or timeout</text>
<rect x="800" y="550" width="310" height="80" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="955.0" y="590.0" text-anchor="middle" class="h">Admin reviews evidence</text>
<rect x="1240" y="540" width="270" height="90" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="1375.0" y="585.0" text-anchor="middle" class="h">Resolution decision</text>
<rect x="1580" y="540" width="280" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1720.0" y="580.0" text-anchor="middle" class="h">Refund full/partial</text>
<rect x="1240" y="760" width="260" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1370.0" y="800.0" text-anchor="middle" class="h">Release payout</text>
<rect x="800" y="760" width="300" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="950.0" y="791.0" text-anchor="middle" class="h">Partial refund</text>
<text x="950.0" y="811.0" text-anchor="middle" class="t">partial payout</text>
<rect x="430" y="760" width="300" height="80" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="580.0" y="791.0" text-anchor="middle" class="h">Write audit log</text>
<text x="580.0" y="811.0" text-anchor="middle" class="t">reason + actor</text>
<rect x="800" y="980" width="250" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="925.0" y="1017.5" text-anchor="middle" class="h">Close dispute</text>
<rect x="1240" y="970" width="330" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1405.0" y="1006.0" text-anchor="middle" class="h">Update trust/risk</text>
<text x="1405.0" y="1026.0" text-anchor="middle" class="t">and job/payment refs</text>
<rect x="1580" y="980" width="300" height="80" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="1730.0" y="1020.0" text-anchor="middle" class="h">Emit resolution events</text>
<polyline points="320,190 430,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="670,185 800,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1130,185 1240,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1470,185 1580,188" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1588" y="180" class="small">no</text>
<polyline points="1355,230 1355,330" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1363" y="322" class="small">yes</text>
<polyline points="1240,370 1130,375" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="800,375 700,375" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="565,410 565,550" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="700,590 800,590" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1110,590 1240,585" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1510,585 1580,580" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1588" y="572" class="small">refund</text>
<polyline points="1375,630 1375,760" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1383" y="752" class="small">payout</text>
<polyline points="1240,585 1180,585 1180,800 1100,800" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1188" y="792" class="small">split</text>
<polyline points="1580,580 1540,580 1540,900 580,900 580,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1240,800 730,800" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="800,800 730,800" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="730,800 760,800 760,1018 800,1018" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1050,1018 1240,1015" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1570,1015 1580,1020" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="330" y="1190" width="1450" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="346" y="1214" class="t">Operational rule:</text>
<text x="346" y="1232" class="t">Dispute SLAs and timeouts should be configurable. Timeout can auto-escalate, but money movement still requires policy decision and audit.</text>
</svg>
