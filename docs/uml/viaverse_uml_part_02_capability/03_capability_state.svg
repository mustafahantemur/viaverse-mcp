<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1300" viewBox="0 0 1900 1300">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="1820" height="60" rx="14" fill="#022C22"/>
<text x="950.0" y="69" text-anchor="middle" class="title">Viaverse Capability — State Diagram</text>

<rect x="110" y="200" width="220" height="80" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="220.0" y="240.0" text-anchor="middle" class="h">NOT_ENABLED</text>
<rect x="450" y="200" width="260" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="580.0" y="240.0" text-anchor="middle" class="h">PENDING_ONBOARDING</text>
<rect x="830" y="200" width="240" height="80" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="950.0" y="240.0" text-anchor="middle" class="h">PENDING_REVIEW</text>
<rect x="1190" y="200" width="220" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1300.0" y="240.0" text-anchor="middle" class="h">ENABLED</text>
<rect x="1190" y="470" width="220" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1300.0" y="510.0" text-anchor="middle" class="h">SUSPENDED</text>
<rect x="830" y="470" width="220" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="940.0" y="510.0" text-anchor="middle" class="h">REVOKED</text>
<rect x="450" y="470" width="260" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="580.0" y="510.0" text-anchor="middle" class="h">ACCOUNT_DELETED</text>
<polyline points="330,240 450,240" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="458" y="232" class="small">start onboarding</text>
<polyline points="710,240 830,240" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="838" y="232" class="small">submit verification if required</text>
<polyline points="1070,240 1190,240" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1198" y="232" class="small">approved</text>
<polyline points="580,280 580,360 1300,360 1300,280" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1308" y="352" class="small">no review required</text>
<polyline points="1300,280 1300,470" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1308" y="462" class="small">policy / risk / admin</text>
<polyline points="1190,510 1110,510 1110,280 1190,280" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1118" y="272" class="small">appeal / fix issue</text>
<polyline points="1190,510 1050,510" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1058" y="502" class="small">severe / final</text>
<polyline points="830,510 710,510 710,280 580,280" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="718" y="272" class="small">re-apply if policy allows</text>
<polyline points="1190,240 580,240 580,470" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="588" y="232" class="small">account deletion</text>
<polyline points="1190,510 710,510 710,510" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="718" y="502" class="small">account deletion</text>
<rect x="200" y="760" width="1300" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="216" y="784" class="t">The same state machine applies per capability:</text>
<text x="216" y="802" class="t">REQUEST_WORK, DO_WORK_INDIVIDUALLY, OPERATE_BUSINESS, SOCIAL_PARTICIPATION, and admin capabilities.</text>
</svg>
