<rect x="1510" y="770" width="300" height="85" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1660.0" y="803.5" text-anchor="middle" class="h">Create dispute case</text>
<text x="1660.0" y="823.5" text-anchor="middle" class="t">payout blocked</text>
<rect x="780" y="780" width="270" height="75" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
