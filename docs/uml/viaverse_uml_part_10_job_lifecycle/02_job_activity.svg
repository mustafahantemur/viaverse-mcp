<rect x="1510" y="150" width="280" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1650.0" y="181.0" text-anchor="middle" class="h">Block start</text>
<text x="1650.0" y="201.0" text-anchor="middle" class="t">payment failed/retry</text>
<rect x="1180" y="330" width="280" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
