<rect x="400" y="330" width="300" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="550.0" y="366.0" text-anchor="middle" class="h">Job workspace</text>
<text x="550.0" y="386.0" text-anchor="middle" class="t">chat / media / updates</text>
<rect x="400" y="560" width="290" height="75" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
