<rect x="400" y="780" width="300" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="550.0" y="817.5" text-anchor="middle" class="h">Mark payout eligible</text>
<rect x="400" y="990" width="300" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
