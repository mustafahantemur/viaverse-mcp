<rect x="780" y="990" width="300" height="85" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="930.0" y="1023.5" text-anchor="middle" class="h">Emit JobCompleted</text>
<text x="930.0" y="1043.5" text-anchor="middle" class="t">PayoutEligible</text>
<rect x="1180" y="1010" width="150" height="55" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="1255.0" y="1037.5" text-anchor="middle" class="h">END</text>
<polyline points="300,190 400,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="660,185 780,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1060,185 1180,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1400,185 1510,190" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1518" y="182" class="small">no</text>
<polyline points="1290,230 1290,330" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1298" y="322" class="small">yes</text>
<polyline points="1180,367 1060,367" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="780,367 700,375" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="550,420 550,560" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="690,598 780,598" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1100,598 1180,595" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1420,595 1510,598" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1518" y="590" class="small">needs fix</text>
<polyline points="1510,598 1460,598 1460,700 545,700 545,635" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1468" y="692" class="small">redeliver</text>
<polyline points="1290,640 1290,715 915,715 915,780" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="923" y="707" class="small">approved</text>
<polyline points="1290,640 1290,760" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1298" y="752" class="small">problem</text>
<polyline points="1410,805 1510,812" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1518" y="804" class="small">yes</text>
<polyline points="780,817 700,817" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="550,855 550,990" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="700,1028 780,1032" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1080,1032 1180,1037" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="320" y="1170" width="1450" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="336" y="1194" class="t">Approval rule:</text>
<text x="336" y="1212" class="t">Auto-approval after timeout can be added later as configurable policy, but dispute/report path must always be available before payout release.</text>
</svg>
