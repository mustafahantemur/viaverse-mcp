<rect x="1510" y="560" width="280" height="75" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1650.0" y="597.5" text-anchor="middle" class="h">Request fix / revision</text>
<rect x="1180" y="760" width="230" height="90" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
