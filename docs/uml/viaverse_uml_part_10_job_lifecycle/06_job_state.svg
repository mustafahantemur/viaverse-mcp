<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1550" viewBox="0 0 2200 1550">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2120" height="60" rx="14" fill="#022C22"/>
<text x="1100.0" y="69" text-anchor="middle" class="title">Viaverse Job Lifecycle — State Diagram</text>

<rect x="120" y="180" width="280" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="260.0" y="211.0" text-anchor="middle" class="h">CREATED</text>
<text x="260.0" y="231.0" text-anchor="middle" class="t">from accepted quote</text>
<rect x="520" y="180" width="280" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="660.0" y="220.0" text-anchor="middle" class="h">WAITING_PAYMENT</text>
<rect x="920" y="180" width="300" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1070.0" y="220.0" text-anchor="middle" class="h">READY_TO_START</text>
<rect x="1340" y="180" width="260" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="1470.0" y="220.0" text-anchor="middle" class="h">IN_PROGRESS</text>
<rect x="1340" y="470" width="260" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1470.0" y="510.0" text-anchor="middle" class="h">DELIVERED</text>
<rect x="920" y="470" width="330" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1085.0" y="510.0" text-anchor="middle" class="h">REVISION_REQUESTED</text>
<rect x="520" y="470" width="260" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="650.0" y="510.0" text-anchor="middle" class="h">COMPLETED</text>
<rect x="120" y="470" width="250" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="245.0" y="510.0" text-anchor="middle" class="h">DISPUTED</text>
<rect x="520" y="760" width="260" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="650.0" y="800.0" text-anchor="middle" class="h">CANCELLED</text>
<rect x="920" y="760" width="260" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="1050.0" y="800.0" text-anchor="middle" class="h">REFUNDED</text>
<rect x="1340" y="760" width="300" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="1490.0" y="800.0" text-anchor="middle" class="h">PAYOUT_ELIGIBLE</text>
<polyline points="400,220 520,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="528" y="212" class="small">created</text>
<polyline points="800,220 920,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="928" y="212" class="small">PaymentAuthorized</text>
<polyline points="1220,220 1340,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1348" y="212" class="small">worker starts</text>
<polyline points="1470,260 1470,470" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1478" y="462" class="small">deliver</text>
<polyline points="1340,510 1250,510" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1258" y="502" class="small">needs fix</text>
<polyline points="1085,470 1085,330 1470,330 1470,260" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1478" y="322" class="small">redeliver work</text>
<polyline points="1340,510 780,510" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="788" y="502" class="small">approved</text>
<polyline points="650,550 650,700 1490,700 1490,760" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1498" y="692" class="small">payout eligible</text>
<polyline points="1070,260 1070,700 650,700 650,760" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="658" y="692" class="small">cancel allowed</text>
<polyline points="1340,220 245,220 245,470" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="253" y="212" class="small">problem</text>
<polyline points="1340,510 370,510" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="378" y="502" class="small">dispute</text>
<polyline points="370,510 760,510 760,800 920,800" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="768" y="792" class="small">resolved refund</text>
<polyline points="370,510 520,510" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="528" y="502" class="small">resolved complete</text>
<rect x="160" y="1020" width="1350" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="176" y="1044" class="t">Terminal-ish states:</text>
<text x="176" y="1062" class="t">COMPLETED proceeds to review/payout; CANCELLED/REFUNDED close the job. DISPUTED blocks payout until resolved.</text>
</svg>
