<polyline points="560,410 560,550" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="790,598 900,590" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1180,590 1280,590" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1490,590 1600,590" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1608" y="582" class="small">no</text>
<polyline points="1385,630 1385,750" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
