<polyline points="1280,787 1220,787" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="900,787 760,790" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="595,830 595,980" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1600,590 1560,590 1560,930 580,930 580,980" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<polyline points="730,1022 900,1028" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="330" y="1160" width="1520" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="346" y="1184" class="t">Security rule:</text>
<text x="346" y="1202" class="t">Original objects stay private. Delivery uses CDN policy based on context: public profile assets may be public/CDN, private chat/job assets use signed access.</text>
