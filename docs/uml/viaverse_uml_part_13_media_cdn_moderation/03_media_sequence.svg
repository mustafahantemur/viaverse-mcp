<polyline points="785,430 870,430" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="878" y="422" class="small">create presigned PUT</text>
<polyline points="600,500 265,500" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="273" y="492" class="small">upload URL + mediaId</text>
<polyline points="265,610 870,610" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="878" y="602" class="small">PUT binary directly</text>
<polyline points="265,740 330,740" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="338" y="732" class="small">POST /media/{id}/confirm</text>
<polyline points="515,780 600,780" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="608" y="772" class="small">confirmUpload</text>
<polyline points="785,820 1140,820" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1148" y="812" class="small">enqueue processing job</text>
<polyline points="1140,880 1050,880 1050,610 870,610" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1058" y="602" class="small">read original / write derivatives</text>
<polyline points="1325,940 1410,940" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1418" y="932" class="small">scan media</text>
<polyline points="1325,1010 1680,1010" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1688" y="1002" class="small">update APPROVED/REJECTED + derivatives</text>
<polyline points="1325,1080 1940,1080" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1948" y="1072" class="small">MediaApproved / MediaRejected</text>
<rect x="80" y="1340" width="1700" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="1364" class="t">Sequence focus:</text>
<text x="96" y="1382" class="t">Client uploads binary directly to object storage; media-service manages session, metadata, processing, moderation and domain references.</text>
