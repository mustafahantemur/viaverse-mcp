<rect x="1260" y="560" width="300" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1410.0" y="597.5" text-anchor="middle" class="h">Recalculate trust score</text>
<rect x="1620" y="560" width="280" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
