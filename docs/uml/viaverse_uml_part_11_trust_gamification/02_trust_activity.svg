<polyline points="860,385 720,388" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="728" y="380" class="small">no</text>
<polyline points="990,430 990,560" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="998" y="552" class="small">yes</text>
<polyline points="570,425 570,500 990,500 990,560" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="998" y="492" class="small">admin approved</text>
<polyline points="1120,598 1260,598" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1560,598 1620,598" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1760,635 1760,720 1410,720 1410,780" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1260,818 1160,818" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="860,818 740,818" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="580,855 580,980" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="700,1020 860,1028" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="340" y="1160" width="1460" height="62" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="356" y="1184" class="t">Fairness rule:</text>
<text x="356" y="1202" class="t">Trust/ranking updates must be resistant to abuse: one review per side per job, duplicate prevention, suspicious review detection and admin moderation.</text>
