<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1550" viewBox="0 0 2200 1550">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2120" height="60" rx="14" fill="#022C22"/>
<text x="1100.0" y="69" text-anchor="middle" class="title">Viaverse Badge / Review Prompt — State Diagram</text>

<rect x="120" y="180" width="280" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="260.0" y="220.0" text-anchor="middle" class="h">PROMPT_CREATED</text>
<rect x="520" y="180" width="250" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="645.0" y="220.0" text-anchor="middle" class="h">PROMPT_SENT</text>
<rect x="900" y="180" width="300" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="1050.0" y="220.0" text-anchor="middle" class="h">REVIEW_SUBMITTED</text>
<rect x="1320" y="180" width="360" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1500.0" y="220.0" text-anchor="middle" class="h">QUEUED_FOR_MODERATION</text>
<rect x="900" y="470" width="320" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1060.0" y="510.0" text-anchor="middle" class="h">REVIEW_PUBLISHED</text>
<rect x="520" y="470" width="300" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="670.0" y="510.0" text-anchor="middle" class="h">REVIEW_REJECTED</text>
<rect x="120" y="470" width="280" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="260.0" y="510.0" text-anchor="middle" class="h">PROMPT_EXPIRED</text>
<rect x="520" y="800" width="300" height="80" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="670.0" y="840.0" text-anchor="middle" class="h">BADGE_ELIGIBLE</text>
<rect x="900" y="800" width="270" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1035.0" y="840.0" text-anchor="middle" class="h">BADGE_ACTIVE</text>
<rect x="1320" y="800" width="300" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="1470.0" y="840.0" text-anchor="middle" class="h">BADGE_REVOKED</text>
<polyline points="400,220 520,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="528" y="212" class="small">notify</text>
<polyline points="770,220 900,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="908" y="212" class="small">user submits</text>
<polyline points="645,260 645,360 260,360 260,470" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="268" y="352" class="small">timeout</text>
<polyline points="1200,220 1320,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1328" y="212" class="small">needs moderation</text>
<polyline points="1050,260 1050,470" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1058" y="462" class="small">auto safe</text>
<polyline points="1320,220 1250,220 1250,510 1220,510" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1258" y="502" class="small">approved</text>
<polyline points="1320,220 670,220 670,470" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="678" y="212" class="small">rejected</text>
<polyline points="900,510 820,510 820,800" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="828" y="502" class="small">score/rule update</text>
<polyline points="820,840 900,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="908" y="832" class="small">award</text>
<polyline points="1170,840 1320,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1328" y="832" class="small">criteria no longer met / admin</text>
<polyline points="1320,880 1260,930 670,930 670,880" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="678" y="922" class="small">re-evaluate</text>
<rect x="160" y="1080" width="1350" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="176" y="1104" class="t">Badge lifecycle:</text>
<text x="176" y="1122" class="t">Badges are not permanent trophies. Trust/risk changes can revoke or downgrade them if criteria are no longer met.</text>
</svg>
