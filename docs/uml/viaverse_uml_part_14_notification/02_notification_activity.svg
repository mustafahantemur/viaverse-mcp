<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1550" viewBox="0 0 2200 1550">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2120" height="60" rx="14" fill="#022C22"/>
<text x="1100.0" y="69" text-anchor="middle" class="title">Viaverse Notification / Delivery — Activity Diagram</text>

<rect x="80" y="160" width="220" height="60" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="190.0" y="181.0" text-anchor="middle" class="h">START</text>
<text x="190.0" y="201.0" text-anchor="middle" class="t">domain event</text>
<rect x="400" y="140" width="300" height="90" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="550.0" y="176.0" text-anchor="middle" class="h">Consume event</text>
<text x="550.0" y="196.0" text-anchor="middle" class="t">and deduplicate</text>
<rect x="820" y="140" width="330" height="90" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="985.0" y="176.0" text-anchor="middle" class="h">Evaluate policy</text>
<text x="985.0" y="196.0" text-anchor="middle" class="t">priority / type / audience</text>
<rect x="1260" y="140" width="230" height="90" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="1375.0" y="185.0" text-anchor="middle" class="h">Notify?</text>
<rect x="1600" y="150" width="290" height="75" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1745.0" y="187.5" text-anchor="middle" class="h">Drop / record suppressed</text>
<rect x="1260" y="330" width="350" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1435.0" y="366.0" text-anchor="middle" class="h">Load preferences</text>
<text x="1435.0" y="386.0" text-anchor="middle" class="t">quiet hours / channel opt-in</text>
<rect x="820" y="330" width="330" height="80" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="985.0" y="370.0" text-anchor="middle" class="h">Render localized template</text>
<rect x="400" y="340" width="270" height="70" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="535.0" y="375.0" text-anchor="middle" class="h">Create inbox item</text>
<rect x="400" y="550" width="270" height="75" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="535.0" y="587.5" text-anchor="middle" class="h">Select channels</text>
<rect x="820" y="550" width="260" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="950.0" y="587.5" text-anchor="middle" class="h">Push delivery</text>
<rect x="1260" y="550" width="300" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1410.0" y="587.5" text-anchor="middle" class="h">Email/SMS delivery</text>
<rect x="1260" y="760" width="320" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1420.0" y="797.5" text-anchor="middle" class="h">Record delivery result</text>
<rect x="820" y="760" width="300" height="90" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="970.0" y="805.0" text-anchor="middle" class="h">Retry/backoff needed?</text>
<rect x="400" y="760" width="300" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="550.0" y="800.0" text-anchor="middle" class="h">Schedule retry / digest</text>
<rect x="820" y="980" width="300" height="85" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="970.0" y="1022.5" text-anchor="middle" class="h">Emit delivery events</text>
<rect x="1260" y="1000" width="150" height="55" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="1335.0" y="1027.5" text-anchor="middle" class="h">END</text>
<polyline points="300,190 400,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="700,185 820,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1150,185 1260,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1490,185 1600,188" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1608" y="180" class="small">no</text>
<polyline points="1375,230 1375,330" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1383" y="322" class="small">yes</text>
<polyline points="1260,375 1150,370" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="820,370 670,375" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="535,410 535,550" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="670,587 820,587" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="828" y="579" class="small">push</text>
<polyline points="670,587 1260,587" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1268" y="579" class="small">email/sms</text>
<polyline points="1080,587 1260,798" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1410,625 1410,760" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1260,798 1120,805" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="820,805 700,800" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="708" y="792" class="small">yes</text>
<polyline points="970,850 970,980" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="978" y="972" class="small">no/final</text>
<polyline points="550,840 550,930 970,930 970,980" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="978" y="922" class="small">retry scheduled</text>
<polyline points="1120,1022 1260,1028" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="330" y="1160" width="1520" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="346" y="1184" class="t">Reliability rule:</text>
<text x="346" y="1202" class="t">Every notification has deduplication key, delivery attempts and final state. High-priority transactional events should not be batched into digest.</text>
</svg>
