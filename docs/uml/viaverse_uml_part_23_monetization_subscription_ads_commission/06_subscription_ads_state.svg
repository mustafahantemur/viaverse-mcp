<rect x="160" y="1080" width="1700" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="176" y="1104" class="t">State rule:</text>
<text x="176" y="1122" class="t">Subscription state gates business features; ad state gates sponsored visibility. Ad approval never overrides business suspension or search safety/relevance gates.</text>
