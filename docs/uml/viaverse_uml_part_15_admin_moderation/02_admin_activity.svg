<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1550" viewBox="0 0 2200 1550">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2120" height="60" rx="14" fill="#022C22"/>
<text x="1100.0" y="69" text-anchor="middle" class="title">Viaverse Admin / Moderation Action — Activity Diagram</text>

<rect x="80" y="160" width="250" height="60" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="205.0" y="181.0" text-anchor="middle" class="h">START</text>
<text x="205.0" y="201.0" text-anchor="middle" class="t">admin action request</text>
<rect x="430" y="140" width="310" height="90" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="585.0" y="185.0" text-anchor="middle" class="h">Admin MFA + session check</text>
<rect x="850" y="140" width="330" height="90" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1015.0" y="176.0" text-anchor="middle" class="h">Check RBAC/ABAC</text>
<text x="1015.0" y="196.0" text-anchor="middle" class="t">resource scope</text>
<rect x="1290" y="140" width="230" height="90" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="1405.0" y="185.0" text-anchor="middle" class="h">Allowed?</text>
<rect x="1620" y="150" width="290" height="75" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1765.0" y="187.5" text-anchor="middle" class="h">Deny + audit attempt</text>
<rect x="1290" y="330" width="280" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1430.0" y="367.5" text-anchor="middle" class="h">Open case/resource</text>
<rect x="850" y="330" width="330" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1015.0" y="366.0" text-anchor="middle" class="h">Review evidence</text>
<text x="1015.0" y="386.0" text-anchor="middle" class="t">minimum necessary data</text>
<rect x="430" y="340" width="260" height="70" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="560.0" y="375.0" text-anchor="middle" class="h">Choose action</text>
<rect x="430" y="550" width="300" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="580.0" y="587.5" text-anchor="middle" class="h">Enter reason + notes</text>
<rect x="850" y="540" width="350" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1025.0" y="576.0" text-anchor="middle" class="h">Validate action policy</text>
<text x="1025.0" y="596.0" text-anchor="middle" class="t">severity / cooldown / limits</text>
<rect x="1290" y="550" width="300" height="75" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1440.0" y="587.5" text-anchor="middle" class="h">Apply domain action</text>
<rect x="1290" y="760" width="320" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1450.0" y="797.5" text-anchor="middle" class="h">Write immutable audit log</text>
<rect x="850" y="760" width="330" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1015.0" y="788.5" text-anchor="middle" class="h">Notify affected user</text>
<text x="1015.0" y="808.5" text-anchor="middle" class="t">if policy allows</text>
<rect x="430" y="760" width="300" height="75" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="580.0" y="788.5" text-anchor="middle" class="h">Create appeal path</text>
<text x="580.0" y="808.5" text-anchor="middle" class="t">if eligible</text>
<rect x="850" y="980" width="330" height="85" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1015.0" y="1022.5" text-anchor="middle" class="h">Emit AdminActionApplied</text>
<rect x="1290" y="1000" width="150" height="55" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="1365.0" y="1027.5" text-anchor="middle" class="h">END</text>
