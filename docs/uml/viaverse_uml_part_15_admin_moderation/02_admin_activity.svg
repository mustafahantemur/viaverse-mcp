<polyline points="1180,185 1290,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1520,185 1620,188" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="1628" y="180" class="small">no</text>
<polyline points="1405,230 1405,330" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1413" y="322" class="small">yes</text>
<polyline points="1290,367 1180,375" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="850,375 690,375" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="560,410 560,550" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="730,588 850,585" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1200,585 1290,588" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1440,625 1440,760" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1290,798 1180,798" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="850,798 730,798" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="580,835 580,930 1015,930 1015,980" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1180,1022 1290,1028" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="330" y="1160" width="1520" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="346" y="1184" class="t">Least privilege rule:</text>
<text x="346" y="1202" class="t">Admin screens should reveal the minimum necessary data for the case. Private messages/media require explicit reason and scoped access.</text>
</svg>
