<text x="1378" y="672" class="small">find/create Account</text>
<polyline points="770,720 1370,720" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1378" y="712" class="small">create Session + RefreshTokenFamily</text>
<polyline points="770,760 1630,760" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1638" y="752" class="small">OtpVerified / SessionCreated</text>
<polyline points="590,840 510,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="518" y="832" class="small">access JWT + refresh token</text>
<polyline points="330,880 270,880" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="278" y="872" class="small">auth result</text>
<rect x="110" y="1110" width="1560" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="126" y="1134" class="t">Sequence focus: OTP login. OAuth login follows same account/session creation after provider callback verification.</text>
