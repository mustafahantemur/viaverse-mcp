<polyline points="510,600 590,600" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="598" y="592" class="small">verifyOtp()</text>
<polyline points="770,640 850,640" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="858" y="632" class="small">check attempts/ttl</text>
