<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1300" viewBox="0 0 1900 1300">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="1820" height="60" rx="14" fill="#022C22"/>
<text x="950.0" y="69" text-anchor="middle" class="title">Viaverse Auth — Activity Diagram</text>

<rect x="80" y="160" width="130" height="50" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="145.0" y="185.0" text-anchor="middle" class="h">START</text>
<rect x="300" y="150" width="210" height="70" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="405.0" y="185.0" text-anchor="middle" class="h">Select language</text>
<rect x="610" y="150" width="230" height="70" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="725.0" y="185.0" text-anchor="middle" class="h">Choose login method</text>
<rect x="950" y="140" width="190" height="90" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="1045.0" y="185.0" text-anchor="middle" class="h">OTP or OAuth?</text>
<rect x="760" y="330" width="260" height="80" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="890.0" y="361.0" text-anchor="middle" class="h">Create OTP challenge</text>
<text x="890.0" y="381.0" text-anchor="middle" class="t">hash code + rate limit</text>
<rect x="760" y="460" width="260" height="70" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="890.0" y="495.0" text-anchor="middle" class="h">Send SMS/email OTP</text>
<rect x="760" y="580" width="260" height="80" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="890.0" y="611.0" text-anchor="middle" class="h">Verify OTP</text>
<text x="890.0" y="631.0" text-anchor="middle" class="t">attempt + expiry check</text>
<rect x="1210" y="330" width="240" height="70" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1330.0" y="365.0" text-anchor="middle" class="h">Redirect to provider</text>
<rect x="1210" y="460" width="240" height="70" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1330.0" y="495.0" text-anchor="middle" class="h">Verify provider callback</text>
<rect x="1040" y="720" width="250" height="75" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1165.0" y="757.5" text-anchor="middle" class="h">Find or create Account</text>
<rect x="1040" y="840" width="250" height="75" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="1165.0" y="877.5" text-anchor="middle" class="h">Required consent accepted?</text>
<rect x="740" y="980" width="280" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="880.0" y="1008.5" text-anchor="middle" class="h">Choose first intent</text>
<text x="880.0" y="1028.5" text-anchor="middle" class="t">Request / Work / Business</text>
<rect x="1110" y="980" width="300" height="75" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1260.0" y="1008.5" text-anchor="middle" class="h">Create session</text>
<text x="1260.0" y="1028.5" text-anchor="middle" class="t">access JWT + refresh token</text>
<rect x="1510" y="990" width="150" height="55" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="1585.0" y="1017.5" text-anchor="middle" class="h">ENTER APP</text>
<polyline points="210,185 300,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="510,185 610,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="840,185 950,185" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1045,230 1045,285 890,285 890,330" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="898" y="277" class="small">OTP path</text>
<polyline points="890,410 890,460" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="890,530 890,580" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1140,185 1330,185 1330,330" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1338" y="177" class="small">OAuth path</text>
<polyline points="1330,400 1330,460" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1020,620 1165,620 1165,720" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1173" y="612" class="small">valid</text>
<polyline points="1330,530 1330,670 1165,670 1165,720" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1173" y="662" class="small">valid</text>
<polyline points="1165,795 1165,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1040,875 880,875 880,980" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="888" y="867" class="small">not yet</text>
<polyline points="1290,875 1260,875 1260,980" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1268" y="867" class="small">accepted</text>
<polyline points="1020,1018 1110,1018" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="1410,1018 1510,1018" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="80" y="820" width="520" height="110" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="844" class="t">Failure exits:</text>
<text x="96" y="862" class="t">invalid OTP → retry until max attempts</text>
<text x="96" y="880" class="t">expired OTP → request new challenge</text>
<text x="96" y="898" class="t">OAuth failure → return to method selection</text>
<text x="96" y="916" class="t">missing required consent → block protected app entry</text>
</svg>
