<rect x="80" y="1030" width="1700" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="1054" class="t">Dependency rule:</text>
<text x="96" y="1072" class="t">Dependencies point inward. Domain is pure. Adapters depend on application ports; application does not depend on adapter implementation.</text>
