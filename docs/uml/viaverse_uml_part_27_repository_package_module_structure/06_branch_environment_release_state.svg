<svg xmlns="http://www.w3.org/2000/svg" width="2450" height="1700" viewBox="0 0 2450 1700">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker><marker id="arrowD" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>.title{font:700 24px Arial;fill:white}.h{font:700 12px Arial;fill:#111827}.t{font:400 11px Arial;fill:#111827}.small{font:400 11px Arial;fill:#4B5563}</style></defs>
<rect x="40" y="30" width="2370" height="60" rx="14" fill="#022C22"/><text x="1225.0" y="69" text-anchor="middle" class="title">Viaverse Branch / Environment / Release State — State Diagram</text>
<rect x="120" y="180" width="260" height="80" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="250.0" y="211.0" text-anchor="middle" class="h">main</text>
<text x="250.0" y="229.0" text-anchor="middle" class="t">production-ready</text>
<rect x="520" y="180" width="260" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="650.0" y="211.0" text-anchor="middle" class="h">develop</text>
<text x="650.0" y="229.0" text-anchor="middle" class="t">integration</text>
<rect x="920" y="180" width="360" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1100.0" y="211.0" text-anchor="middle" class="h">feature/{context}-{ticket}</text>
<text x="1100.0" y="229.0" text-anchor="middle" class="t">short-lived</text>
<rect x="1420" y="180" width="300" height="80" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
<text x="1570.0" y="211.0" text-anchor="middle" class="h">pull request</text>
<text x="1570.0" y="229.0" text-anchor="middle" class="t">review + CI</text>
<rect x="1420" y="500" width="340" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1590.0" y="531.0" text-anchor="middle" class="h">staging deploy</text>
<text x="1590.0" y="549.0" text-anchor="middle" class="t">release candidate</text>
<rect x="920" y="500" width="300" height="80" rx="14" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
<text x="1070.0" y="540.0" text-anchor="middle" class="h">release/vX.Y.Z</text>
<rect x="520" y="500" width="280" height="80" rx="14" fill="#022C22" stroke="#022C22" stroke-width="2"/>
<text x="660.0" y="531.0" text-anchor="middle" class="h">production tag</text>
<text x="660.0" y="549.0" text-anchor="middle" class="t">vX.Y.Z</text>
<rect x="120" y="500" width="300" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="270.0" y="540.0" text-anchor="middle" class="h">hotfix/vX.Y.Z+1</text>
<rect x="920" y="840" width="340" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="1090.0" y="871.0" text-anchor="middle" class="h">branch deleted</text>
<text x="1090.0" y="889.0" text-anchor="middle" class="t">artifact archived</text>
<polyline points="380,220 520,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="528" y="212" class="small">open next phase</text>
<polyline points="780,220 920,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="928" y="212" class="small">branch</text>
<polyline points="1280,220 1420,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1428" y="212" class="small">open PR</text>
<polyline points="1420,260 1320,330 650,330 650,260" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowD)" stroke-dasharray="6 5"/>
<text x="658" y="322" class="small">merge if green</text>
<polyline points="650,260 650,540 920,540" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="658" y="532" class="small">cut RC</text>
<polyline points="1220,540 1420,540" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1428" y="532" class="small">deploy</text>
<polyline points="1420,540 800,540" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="808" y="532" class="small">promote</text>
<polyline points="660,500 660,420 250,420 250,260" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowD)" stroke-dasharray="6 5"/>
<text x="258" y="412" class="small">merge/tag</text>
<polyline points="520,540 420,540" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowD)" stroke-dasharray="6 5"/>
<text x="428" y="532" class="small">incident</text>
<polyline points="270,500 270,360 1570,360 1570,260" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowD)" stroke-dasharray="6 5"/>
<text x="1578" y="352" class="small">PR to main/develop</text>
<polyline points="1100,260 1100,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1108" y="832" class="small">after merge/close</text>
<polyline points="1070,580 1070,840" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1078" y="832" class="small">after release</text>
<rect x="160" y="1120" width="1620" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="176" y="1144" class="t">Branch rule:</text>
<text x="176" y="1162" class="t">Short-lived feature branches. CI green before merge. Production tags are immutable. Hotfix is merged back to main and develop.</text>
</svg>
