<rect x="40" y="30" width="2370" height="60" rx="14" fill="#022C22"/><text x="1225.0" y="69" text-anchor="middle" class="title">Viaverse Spring Boot Service — Hexagonal Package Structure</text>
<rect x="60" y="130" width="2320" height="1320" rx="10" fill="none" stroke="#022C22" stroke-width="2"/><text x="76" y="155" class="h">backend/services/{bounded-context}-service/</text>
