<polyline points="570,630 570,780" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<polyline points="750,820 925,820 925,1010" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="330" y="1160" width="1520" height="60" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="346" y="1184" class="t">Data governance rule:</text>
<text x="346" y="1202" class="t">Every event has owner, schema version, retention class and sensitivity classification. Unknown schemas go to DLQ, not silent production metrics.</text>
