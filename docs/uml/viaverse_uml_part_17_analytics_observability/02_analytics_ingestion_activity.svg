<polyline points="550,415 550,550" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="558" y="542" class="small">yes</text>
<polyline points="670,377 780,377 780,595 850,595" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="788" y="587" class="small">no</text>
<polyline points="1210,595 1280,595" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
