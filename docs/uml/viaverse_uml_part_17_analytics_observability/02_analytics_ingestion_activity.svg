<text x="1030.0" y="586.0" text-anchor="middle" class="h">Persist raw-safe event</text>
<text x="1030.0" y="606.0" text-anchor="middle" class="t">or stream to warehouse</text>
<rect x="1280" y="550" width="340" height="90" rx="14" fill="#FFFFFF" stroke="#064E3B" stroke-width="2"/>
<text x="1450.0" y="586.0" text-anchor="middle" class="h">Update aggregates</text>
