<rect x="980" y="560" width="220" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="1090.0" y="600.0" text-anchor="middle" class="h">MAPPED</text>
<rect x="1460" y="560" width="320" height="80" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="1620.0" y="600.0" text-anchor="middle" class="h">REMAP_REQUIRED</text>
<rect x="980" y="900" width="340" height="80" rx="14" fill="#F9FAFB" stroke="#4B5563" stroke-width="2"/>
<text x="1150.0" y="940.0" text-anchor="middle" class="h">MAPPING_ARCHIVED</text>
<polyline points="400,220 520,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="528" y="212" class="small">submit</text>
<polyline points="850,220 980,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="988" y="212" class="small">approve</text>
<polyline points="520,260 400,260" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowDashed)" stroke-dasharray="6 5"/>
<text x="408" y="252" class="small">changes</text>
<polyline points="1330,220 1460,220" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1468" y="212" class="small">new version</text>
<polyline points="360,600 520,600" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="528" y="592" class="small">AI suggestion</text>
<polyline points="820,600 980,600" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
<text x="988" y="592" class="small">user/admin confirms</text>
<polyline points="360,600 980,600" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
