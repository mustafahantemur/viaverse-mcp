<rect x="160" y="1120" width="1600" height="70" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
<text x="176" y="1144" class="t">State rule:</text>
<text x="176" y="1162" class="t">Existing requests/providers must not break when taxonomy changes. Remap-required state and migration mapping protect old data and search continuity.</text>
