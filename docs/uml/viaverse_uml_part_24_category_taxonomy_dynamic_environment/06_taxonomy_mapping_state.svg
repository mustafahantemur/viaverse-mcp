<svg xmlns="http://www.w3.org/2000/svg" width="2300" height="1600" viewBox="0 0 2300 1600">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4B5563"/></marker>
<marker id="arrowDashed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#F97316"/></marker>
<style>
.title { font: 700 24px Arial, sans-serif; fill: white; }
.h { font: 700 13px Arial, sans-serif; fill: #111827; }
.t { font: 400 12px Arial, sans-serif; fill: #111827; }
.small { font: 400 11px Arial, sans-serif; fill: #4B5563; }
</style>
</defs>
<rect x="40" y="30" width="2220" height="60" rx="14" fill="#022C22"/>
<text x="1150.0" y="69" text-anchor="middle" class="title">Viaverse Taxonomy Version / Category Mapping — State Diagram</text>

<rect x="120" y="180" width="280" height="80" rx="14" fill="#ECFDF5" stroke="#064E3B" stroke-width="2"/>
<text x="260.0" y="220.0" text-anchor="middle" class="h">VERSION_DRAFT</text>
<rect x="520" y="180" width="330" height="80" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
